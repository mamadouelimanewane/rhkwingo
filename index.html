<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - DRH MEFPT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            min-height: 100vh;
            background: var(--bg);
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            top: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,200,87,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .login-page::after {
            content: '';
            position: absolute;
            bottom: -20%; left: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,204,0,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
        .login-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .login-logo .brand {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00c857, #FFCC00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-sub {
            color: var(--text3);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .login-form {
            text-align: left;
        }
        .login-btn {
            width: 100%;
            justify-content: center;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .by-kwingo {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text3);
        }
        .by-kwingo span {
            color: var(--green-light);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-card fade-up">
        <div class="login-logo">
            <div class="sidebar-logo" style="padding:0; border:none;">
                <div class="flag">
                    <span class="flag-g"></span><span class="flag-y"></span><span class="flag-r"></span>
                </div>
                <div>
                    <div class="brand">DRH NUMÉRIQUE</div>
                    <div class="sub">MINISTÈRE DU TRAVAIL SÉNÉGAL</div>
                </div>
            </div>
        </div>
        
        <h1 class="login-title">Bienvenue sur votre espace</h1>
        <p class="login-sub">Accédez à l'écosystème RH intégré</p>
        
        <form class="login-form" action="dashboard.html" method="get">
            <div class="form-group">
                <label class="form-label">Identifiant (Matricule de Solde)</label>
                <input type="text" class="form-control" placeholder="Ex: 123456/A" value="700010/B">
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-control" placeholder="••••••••" value="password">
            </div>
            
            <div class="flex-between mb-3 text-sm">
                <label class="flex gap-1"><input type="checkbox" checked> Se souvenir de moi</label>
                <a href="#" class="text-green text-sm" style="text-decoration:none;">Mot de passe oublié ?</a>
            </div>
            
            <button type="submit" class="btn btn-primary login-btn">Se Connecter</button>
        </form>
        
        <div class="by-kwingo">
            Développé avec ❤️ par <span>KWINGO</span>
        </div>
    </div>
</div>

</body>
</html>
